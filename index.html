<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#efe7d6" />
  <title>Sydney · 雪梨之旅</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+TC:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="phone">
    <!-- ============================ HEADER ============================ -->
    <header class="app-header">
      <p class="eyebrow"><span id="tagline"></span> · <span id="subtitle"></span></p>
      <h1 class="app-title"><span id="trip-title"></span> <em>遊記</em></h1>
      <button class="gear" aria-label="settings">&#9881;</button>
    </header>

    <!-- ===================== DATE PILL SELECTOR ====================== -->
    <nav class="date-strip" id="date-strip" aria-label="trip days"></nav>
    <div class="day-track">
      <span class="track-arrow" data-dir="-1">&#8249;</span>
      <div class="track-rail"><span class="track-dot" id="track-dot"></span></div>
      <span class="track-arrow" data-dir="1">&#8250;</span>
    </div>
    <p class="day-counter" id="day-counter"></p>

    <!-- =========================== VIEWS ============================= -->
    <main class="content" id="content"><!-- rendered by app.js --></main>

    <!-- ========================= BOTTOM NAV ========================== -->
    <nav class="tabbar" id="tabbar">
      <button class="tab" data-view="plans"><span class="ic">&#128197;</span><span>行程</span></button>
      <button class="tab" data-view="map"><span class="ic">&#128205;</span><span>地圖</span></button>
      <button class="tab home" data-view="home"><span class="ic">&#127968;</span><span>首頁</span></button>
      <button class="tab" data-view="wallet"><span class="ic">&#128176;</span><span>記帳</span></button>
      <button class="tab" data-view="saved"><span class="ic">&#128278;</span><span>景點</span></button>
    </nav>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
